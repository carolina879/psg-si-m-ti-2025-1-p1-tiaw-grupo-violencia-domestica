<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de denúncias feitas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="stylesheet" href="denuncias-feitas.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="row">
                <div class="col-7 col-md-7">
                    <h2 id="titulo-header">Relatório</h2>
                </div>
                <div class="col-1 col-md-1">

                </div>
                <div class="col-3 col-md-3">
                    <a id="config" href="#">Configurações</a>
                </div>
            </div>
            
            <div class="row">
                <div class="col-12 col-md-12">
                    <div class="botao-container">
                        <h4 id="relatorioCompleto">Filtros de relatório</h4>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div id="cronometro" style="position: fixed; bottom: 20px; right: 20px; background: #e6141474; padding: 10px 15px; border-radius: 8px; font-weight: bold; z-index: 1;">
        Tempo na sessão: <span id="tempoSessao">00:00</span>
    </div>

    <div id="container-main" class="container">
        <div id="main-content">
            <div class="row">
                <div class="col-4 col-md-4">
                    <h3 id="periodo-titulo">PERÍODO:</h3>
                    <div>
                        <form>
                            <input id="input-periodo" type="date">
                        </form>
                    </div>
                </div>
                <div id="local-div" class="col-4 col-md-4">
                    <h3 id="localizacao-titulo">LOCALIZAÇÃO:</h3>
                    <div>
                        <form>
                            <input id="input-local" type="text" placeholder="Cidade ou estado">
                        </form>
                    </div>
                </div>
                <div id="tipo-div" class="col-4 col-md-4">
                    <h3 id="tipo-titulo">TIPO:</h3> 
                    <div>
                        <form>
                            <select id="tipo-violencia" name="tipo-violencia" required>
                                <option value="">Tipo de violência</option>
                                <option value="fisica"> Física </option>
                                <option value="sexual"> Sexual </option>
                                <option value="psicologica"> Psicológica </option>
                                <option value="moral"> Moral </option>
                                <option value="patrimonial"> Patrimonial </option>
                            </select>
                        </form>
                    </div>
                </div>
            </div>

            <div class="row row-cols-md-2 row-cols-md-4 row-cols-sd-4 g-2" id="lista-cards" style="margin-top: 5vh;">
                <div class="col-xs-12 col-md-6 col-lg-3">
                    <div class="card">
                        <div class="card-body"> <!--total de denuncias independente do filtro-->
                            <h5 class="card-title">Total de denúncias</h5>
                        </div>
                    </div>
                </div>
                <div class="col-xs-12 col-md-6 col-lg-3">
                    <div class="card"> <!--número de denúncias de acordo com o tipo selecionado-->
                        <div class="card-body">
                            <h5 class="card-title">Distribuição por tipo de violência</h5>
                        </div>
                    </div>
                </div>
                <div class="col-xs-12 col-md-6 col-lg-3">
                    <div class="card"> <!--nesse card será mostrado em quantos estados diferentes houveram denuncias naquele dia. os filtros são cumulativos-->
                        <div class="card-body">
                            <h5 class="card-title">Distribuição por UF</h5> 
                        </div>
                    </div>
                </div>
                <div class="col-xs-12 col-md-6 col-lg-3">
                    <div class="card"> <!--total de denuncias de acordo com a data-->
                        <div class="card-body">
                            <h5 class="card-title">Denúncias por período</h5>
                        </div>
                    </div>
                </div>
            </div>

                
            <div class="row">
                <div class="col-12 col-md-12">
                    <div class="botao-container">
                        <button id="botao-relatorio">Gerar relatório</button>
                    </div>
                </div>
            </div>


            <div id="container-2">
                <div id="tabela-wrapper">
                    <table id="minhaTabela">
                        <thead>
                        <tr>
                            <th>CÓDIGO</th>
                            <th>DATA</th>
                            <th>LOCAL</th>
                            <th>TIPO</th>
                            <th>SITUAÇÃO</th>
                        </tr>
                        </thead>
                        <tbody>
                        
                            <tr>
                                <td>
                                    #01
                                </td>
                                <td>
                                    18/05/2025
                                </td>
                                <td>
                                    Belo Horizonte
                                </td>
                                <td>
                                    Patrimonial
                                </td>
                                <td>
                                    Encaminhada
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>


<script>
    let segundos = 0;

    function atualizarCronometro() {
        segundos++;

        const minutos = Math.floor(segundos / 60);
        const restoSegundos = segundos % 60;

        const formato = 
        String(minutos).padStart(2, '0') + ':' + 
        String(restoSegundos).padStart(2, '0');

        document.getElementById('tempoSessao').textContent = formato;
    }

    setInterval(atualizarCronometro, 1000);


    document.getElementById("botao-relatorio").addEventListener("click", gerarRelatorio);

    function gerarRelatorio() {
        const dataFiltro = document.getElementById("input-periodo").value;
        const localFiltro = document.getElementById("input-local").value.toLowerCase();
        const tipoFiltro = document.getElementById("tipo-violencia").value.toLowerCase();

        const denuncias = JSON.parse(localStorage.getItem("denuncias")) || [];

        const filtradas = denuncias.filter((denuncia) => {
            const dataMatch = !dataFiltro || denuncia.data === dataFiltro;
            const localMatch = !localFiltro || denuncia.local.toLowerCase().includes(localFiltro);
            const tipoMatch = !tipoFiltro || denuncia.violencia.toLowerCase() === tipoFiltro;
            return dataMatch && localMatch && tipoMatch;
        });

        atualizarTabela(filtradas);
        atualizarCards(filtradas);
    }

    function atualizarTabela(denuncias) {
        const tbody = document.querySelector("#minhaTabela tbody");
        tbody.innerHTML = "";

        if (denuncias.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5">Nenhuma denúncia encontrada com os filtros selecionados.</td></tr>`;
            return;
        }

        denuncias.forEach((denuncia, index) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
            <td>#${String(index + 1).padStart(2, '0')}</td>
            <td>${denuncia.data}</td>
            <td>${denuncia.local}</td>
            <td>${capitalizar(denuncia.violencia)}</td>
            <td>Em análise</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function atualizarCards(denuncias) {
    // Card 1: Total de denúncias
    document.querySelectorAll(".card")[0].querySelector(".card-body").innerHTML = `
        <h5 class="card-title">Total de denúncias</h5>
        <p>${denuncias.length}</p>
    `;

    // Card 2: Distribuição por tipo de violência
    const tipos = {};
    denuncias.forEach(d => {
        const tipo = capitalizar(d.violencia);
        tipos[tipo] = (tipos[tipo] || 0) + 1;
    });
    const tipoHtml = Object.entries(tipos).map(([k, v]) => `<p>${k}: ${v}</p>`).join('');
    document.querySelectorAll(".card")[1].querySelector(".card-body").innerHTML = `
        <h5 class="card-title">Distribuição por tipo de violência</h5>
        ${tipoHtml || "<p>Nenhuma</p>"}
    `;

    // Card 3: Distribuição por estados
    const estados = new Set();
    denuncias.forEach(d => {
        const palavras = d.local.split(" ");
        const estado = palavras[palavras.length - 1]; // Assume último termo como estado
        estados.add(estado.toUpperCase());
    });
    document.querySelectorAll(".card")[2].querySelector(".card-body").innerHTML = `
        <h5 class="card-title">Distribuição por UF</h5>
        <p>${estados.size} estado(s)</p>
    `;

    // Card 4: Denúncias por período
    const porData = {};
    denuncias.forEach(d => {
        porData[d.data] = (porData[d.data] || 0) + 1;
    });
    const dataHtml = Object.entries(porData).map(([d, v]) => `<p>${d}: ${v}</p>`).join('');
    document.querySelectorAll(".card")[3].querySelector(".card-body").innerHTML = `
        <h5 class="card-title">Denúncias por período</h5>
        ${dataHtml || "<p>--</p>"}
    `;
    }

    function capitalizar(str) {
    return str.charAt(0).toUpperCase() + str.slice(1);
    }

    // Autoexecutar para preencher a tabela sem filtro ao carregar a página
    window.addEventListener("DOMContentLoaded", () => {
    gerarRelatorio();
    });
</script>
    
</body>
</html>
