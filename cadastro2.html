<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="stylesheet" href="denuncia.css">
    <script src="denuncia.js"></script>
    <title>Cadastro de Denuncia</title>
</head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
        crossorigin="anonymous"></script>
    <header>





    </header>


    
        <main class="bg-light d-flex justify-content-center align-items-center min-vh-100">
            <form class="bg-secondary text-white p-4 rounded shadow" style="max-width: 800px; width: 100%;" id="formDenuncia2">
                <div class="row g-3">
                    <div class="col-12 col-md-6">
                        <label for="formTitulo" class="form-label">Título da Denúncia</label>
                        <input type="text" class="form-control" id="formTitulo"
                            placeholder="Título que descreva o problema.">
                    </div>
                    <div class="col-12 col-md-6">
                        <label for="formTestemunha" class="form-label">Testemunhas, se houver</label>
                        <input type="text" class="form-control" id="formTestemunha"
                            placeholder="Informe nomes e contatos de possíveis testemunhas.">
                    </div>
                    <div class="col-12 col-md-6">
                        <label for="formDescricao" class="form-label">Descrição Detalhada</label>
                        <textarea class="form-control" id="formDescricao" rows="4"
                            placeholder="Descreva o que aconteceu com detalhes."></textarea>
                    </div>
                    <div class="col-12 col-md-6">
                        <label class="form-label">Tipo de violência</label>
                        <select id="formTipoViolencia" required>
                            <option value="">Tipo de violência</option>
                            <option value="fisica">Física</option>
                            <option value="sexual">Sexual</option>
                            <option value="psicologica">Psicológica</option>
                            <option value="moral">Moral</option>
                            <option value="patrimonial">Patrimonial</option>
                        </select>
                    </div>
                    

                    <!-- Botões -->
                    <div class="col-12 d-flex justify-content-between mt-3">
                        <button type="button" class="btn btn-warning" onclick="VoltarPagina()">Voltar</button>
                        <button type="submit" class="btn btn-warning" onclick="ContinuarPagina()">Continuar</button>
                    </div>
                </div>
            </form>


        </main>

        <footer>

        </footer>
    <script>
        function VoltarPagina() {
            window.location.href = 'cadastro1.html';
        }

        document.getElementById('formDenuncia2').addEventListener('submit', function (event) {
            event.preventDefault();

            const titulo = document.getElementById('formTitulo').value.trim();
            const testemunhas = document.getElementById('formTestemunha').value.trim();
            const descricao = document.getElementById('formDescricao').value.trim();
            const tipoViolencia = document.getElementById('formTipoViolencia').value.trim();

            if (!titulo || !descricao || !tipoViolencia) {
            alert("Preencha todos os campos obrigatórios.");
            return;
            }

            const dadosParte2 = {
            titulo,
            testemunhas,
            descricao,
            violencia: tipoViolencia
            };

            localStorage.setItem('denunciaParte2', JSON.stringify(dadosParte2));
            window.location.href = 'cadastro3.html';
        });
    </script>

        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
        <script src="scripts.js"></script>
    </body>

</html>
