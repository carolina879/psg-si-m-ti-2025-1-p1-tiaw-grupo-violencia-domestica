<script>
    


    function gerarRelatorio() {
        const dataFiltro = document.getElementById("input-periodo").value;
        const localFiltro = document.getElementById("input-local").value.toLowerCase();
        const tipoFiltro = document.getElementById("tipo-violencia").value.toLowerCase();

        const denuncias = JSON.parse(localStorage.getItem("denuncias")) || [];

        const filtradas = denuncias.filter((denuncia) => {
            const dataMatch = !dataFiltro || denuncia.data === dataFiltro;
            const localMatch = !localFiltro || denuncia.local.toLowerCase().includes(localFiltro);
            const tipoMatch = !tipoFiltro || denuncia.violencia.toLowerCase() === tipoFiltro;
            return dataMatch && localMatch && tipoMatch;
        });

        atualizarTabela(filtradas);
        atualizarCards(filtradas);
    }

    function atualizarTabela(denuncias) {
        const tbody = document.querySelector("#minhaTabela tbody");
        tbody.innerHTML = "";

        if (denuncias.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" class="text-center">Nenhuma denúncia encontrada com os filtros selecionados.</td></tr>`;
            return;
        }

        denuncias.forEach((denuncia, index) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `

                <td><a class="link-denuncias" href="detalhes.html?id=${index + 1}">#${String(index + 1).padStart(2, '0')}</a></td>
                <td><a class="link-denuncias" href="detalhes.html?id=${index + 1}">${denuncia.data}</a></td>
                <td><a class="link-denuncias" href="detalhes.html?id=${index + 1}">${denuncia.local}</a></td>
                <td><a class="link-denuncias" href="detalhes.html?id=${index + 1}">${capitalizar(denuncia.violencia)}</a></td>
                <td><a class="link-denuncias" href="detalhes.html?id=${index + 1}">Em análise</a></td>
                <td><button class="btn btn-danger btn-sm btn-excluir" data-index="${index}">Excluir</button></td>
            `;
            tbody.appendChild(tr);
        });

    }

</script>
