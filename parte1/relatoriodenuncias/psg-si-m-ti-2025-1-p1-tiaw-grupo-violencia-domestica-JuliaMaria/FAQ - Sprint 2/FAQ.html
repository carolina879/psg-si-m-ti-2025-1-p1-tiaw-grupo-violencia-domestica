<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escuta Amiga - FAQ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body onload="inicializarFAQ()">

  <header class="cabecalho">
    <h1 class="titulo">Escuta Amiga - Perguntas Frequentes</h1>
  </header>

  <section class="container busca-disfarce">
    <input type="text" id="busca" placeholder="Buscar pergunta..." oninput="filtrarPerguntas()" />
  </section>

  <main id="faq-container" class="container"></main>

  <section class="container">
    <h2>Envie sua pergunta anonimamente</h2>
    <form id="form-pergunta" onsubmit="enviarPergunta(event)">
      <textarea id="novaPergunta" placeholder="Digite sua pergunta aqui..." required></textarea>
      <button type="submit">Enviar Pergunta</button>
    </form>
  </section>

  <section class="container">
    <h3>Perguntas da Comunidade</h3>
    <div id="lista-comunidade">
      <!-- Exemplo estático para referência (será gerado pelo JS) -->

      <div class="comunidade-item">
        <div class="comunidade-pergunta">Exemplo de pergunta da comunidade?</div>
        <p class="resposta">Resposta dada pela equipe.</p>
        <div class="botoes-comunidade">
          <button onclick="abrirFormularioResponder(0)">Responder</button>
          <button onclick="editarPergunta(0)">Editar</button>
          <button onclick="excluirPergunta(0)">Excluir</button>
          <button onclick="adicionarAoFAQ(0)">Adicionar ao FAQ</button>
        </div>
      </div>
      
    </div>
  </section>


  <footer class="rodape">
    <p>Escuta Amiga - Apoio voluntário a vítimas de violência doméstica</p>
    <p>Com colaboração de ONGs, profissionais da saúde e advogados</p>
  </footer>

  <script src="FAQ.js"></script>
</body>
</html>
