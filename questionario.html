<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Escuta Amiga - Questionário</title>

  <link rel="stylesheet" href="index2.css" />
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    /* Reset simples do body para não centralizar navbar */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #fff;
    }

    /* Container centralizado para o conteúdo */
    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    h1, h2 {
      color: #333;
    }

    .pergunta {
      margin-bottom: 20px;
    }

    .avaliacao {
      margin-top: 30px;
      padding: 15px;
      background-color: #f0f0f0;
      border-left: 4px solid #007BFF;
    }

    button {
      padding: 10px 20px;
      margin-top: 20px;
      font-size: 16px;
    }

    /* Estilo para os cards de resultados */
    #resultados {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 20px;
    }

    .card-resultado {
      flex: 1 1 45%;
      background: linear-gradient(90deg, #9B59B6, #920505);
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    /* Navbar com largura total */
    .navbar {
      background: linear-gradient(90deg, #9B59B6, #920505);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      padding: 10px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      width: 100vw; /* largura total da viewport */
      position: sticky; /* navbar fixa no topo */
      top: 0;
      z-index: 999;
    }

    .navbar-logo img {
      max-height: 60px;
    }

    .navbar-title {
      color: white;
      font-size: 1.8rem;
      font-weight: bold;
      margin-left: 10px;
    }

    .navbar-left {
      display: flex;
      align-items: center;
    }

    .navbar-links {
      display: flex;
      list-style: none;
      padding: 0;
      margin: 0;
      gap: 15px;
      flex-wrap: wrap;
    }

    .navbar-links li a {
      color: white;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 8px;
      transition: background-color 0.3s;
    }

    .navbar-links li a:hover {
      background-color: #c90f0f;
    }

     footer {
         background: linear-gradient(90deg, #9B59B6, #920505);
        color: white;
        padding: 20px 10px;
        text-align: center;
        margin-top: 40px;
    }
    footer p {
        margin: 5px 0;
    }
    footer a {
        color: #ffffff;
        text-decoration: underline;
    }
    footer a:hover {
        color: #fff;
    }

  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-left">
      <a href="index.html" class="navbar-logo">
        <img src="LogoTiaw.png" alt="Logo Escuta Amiga" />
      </a>
      <span class="navbar-title">Escuta Amiga</span>
    </div>
    <ul class="navbar-links">
      <li><a href="perfil.html">Sua Página</a></li>
      <li><a href="profissional.html">Colaboradores</a></li>
      <li><a href="quemsomos.html">Quem Somos</a></li>
      <li><a href="politicadeprivacidade.html">Privacidade</a></li>
      <li><a href="FAQ.html">FAQ</a></li>
      <li><a href="login.html">Login</a></li>
    </ul>
  </nav>

  <div class="container">
    <h1 id="titulo"></h1>
    <p id="descricao"></p>

    <h2>Resultados Anteriores</h2>

    <div id="resultados"></div>

    <form id="formulario"></form>

    <div class="avaliacao" id="avaliacao" style="display:none;"></div>
  </div>
<footer>
  <div class="footer-container">
    <div class="footer-info">
      <p style="color: #fff;">&copy; 2025 Escuta Amiga. Todos os direitos reservados.</p>
      <p style="color: #fff;">Precisa de ajuda? Ligue <strong>180</strong> ou acesse 
        <a href="https://www.gov.br/mulheres/pt-br/ligue180" target="_blank">gov.br/ondemdenunciar</a>
      </p>
    </div>
</footer>
  <script src="app2.js"></script>
</body>
</html>
